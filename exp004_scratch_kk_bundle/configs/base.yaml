seed: 42
output_dir: ./outputs
logging_dir: ./logs
block_size: 512
per_device_train_batch_size: 16
gradient_accumulation_steps: 4
num_train_epochs: 3
learning_rate: 5e-5
warmup_ratio: 0.05
weight_decay: 0.01
bf16: true
fp16: false
save_strategy: steps
save_steps: 500
eval_strategy: steps
eval_steps: 500
logging_steps: 50
dataloader_num_workers: 4
report_to: tensorboard

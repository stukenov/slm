# ============================================================================
# exp004b: Custom Llama ~50M from scratch for Kazakh (server kaznu)
# Architecture: Llama (8L, 576h, 8heads, SwiGLU), ~50.3M params
# Tokenizer: kazakh-bpe-32k (local path on server)
# Dataset: kz-transformers/multidomain-kazakh-dataset (raw, tokenized on-the-fly)
# Goal: First custom Llama architecture trained on kaznu (2xA10)
# ============================================================================
inherits: base
experiment_name: exp004_scratch_kk

# Custom Llama ~50M from scratch
model_name: custom-llama-50m
from_scratch: true

model_config:
  model_type: llama
  vocab_size: 32000
  hidden_size: 576
  intermediate_size: 1536
  num_hidden_layers: 8
  num_attention_heads: 8
  num_key_value_heads: 8
  max_position_embeddings: 1024
  tie_word_embeddings: true
  bos_token_id: 0
  eos_token_id: 0
  pad_token_id: 1

# Dataset
dataset_name: kz-transformers/multidomain-kazakh-dataset

# Tokenizer: Kazakh BPE (published at saken-tukenov/sozkz-vocab-bpe-32k-kk-base-v1)
tokenizer_path: ./tokenizers/kazakh-bpe-32k
tokenizer_mode: pretrained

# Training hyperparameters
learning_rate: 6e-4
weight_decay: 0.1
num_train_epochs: 1
per_device_train_batch_size: 16
gradient_accumulation_steps: 2

# Schedule
warmup_steps: 700
max_grad_norm: 1.0
lr_scheduler_type: cosine

# Eval/Save
eval_steps: 2000
save_steps: 2000
logging_steps: 50

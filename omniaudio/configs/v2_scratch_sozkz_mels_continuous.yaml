# OmniAudio v2: Continuous training on 1M mels (warm start from epoch 1)
# Run multiple epochs, save each checkpoint
inherits: v2_base
experiment_name: omniaudio_v2_scratch_sozkz_mels_continuous
model_type: scratch
stage: e2e
dataset_name: sozkz_mels
audio_d_model: 256
audio_n_heads: 4
audio_n_layers: 6
audio_n_conv: 2
decoder_d_model: 512
decoder_n_heads: 8
decoder_n_layers: 8
init_from: ./outputs/omniaudio_v2_scratch_sozkz_mels_finetune/checkpoint-best
freeze_decoder: false
ctc_weight: 0.0
max_audio_len: 10.0
per_device_train_batch_size: 32
gradient_accumulation_steps: 1
dataloader_num_workers: 8
learning_rate: 5e-5
warmup_ratio: 0.02
weight_decay: 0.01
num_train_epochs: 10
save_steps: 5000
eval_steps: 5000
logging_steps: 100
label_smoothing: 0.05

seed: 42
output_dir: ./outputs
logging_dir: ./logs
n_mels: 80
sample_rate: 16000
max_audio_len: 15.0
max_text_len: 256
dataset_name: fleurs
llm_name: saken-tukenov/sozkz-core-llama-150m-kk-base-v1
llm_dim: 768
vocab_size: 50257
# Use local path on server (transformers 5.1 can't load tokenizers from HF)
tokenizer_path: ./tokenizers/kazakh-gpt2-50k
bf16: true
dataloader_num_workers: 4
max_grad_norm: 1.0
label_smoothing: 0.1
text_lowercase: false
text_strip_punctuation: false
text_collapse_whitespace: true
decode_repetition_penalty: 1.15
decode_no_repeat_ngram_size: 3
chunked_inference: false
chunk_audio_len: 15.0
chunk_overlap_sec: 3.0

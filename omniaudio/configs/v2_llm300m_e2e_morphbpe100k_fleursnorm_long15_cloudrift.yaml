# OmniAudio v2: E2E 300M with MorphBPE 100k, FLEURS-style normalization, and 15s audio window
inherits: v2_base
experiment_name: omniaudio_v2_llm300m_morphbpe100k_fleursnorm_long15
model_type: pretrained
stage: e2e
dataset_name: sozkz_mels
llm_name: stukenov/sozkz-core-llama-300m-kk-base-v1
llm_dim: 1024
vocab_size: 100000
tokenizer_path: ./tokenizers/sozkz-morphbpe-100k-kk-v1
audio_d_model: 640
audio_n_heads: 10
audio_n_layers: 14
audio_n_conv: 2
init_from: ./outputs/omniaudio_v2_llm300m_ctc/checkpoint-best
unfreeze_llm_layers: 0
ctc_weight: 0.3
max_audio_len: 15.0
per_device_train_batch_size: 12
gradient_accumulation_steps: 4
dataloader_num_workers: 6
learning_rate: 2e-4
warmup_ratio: 0.05
weight_decay: 0.01
num_train_epochs: 5
save_steps: 4000
logging_steps: 50
label_smoothing: 0.1
bf16: true
torch_compile: false
text_lowercase: true
text_strip_punctuation: true
text_collapse_whitespace: true
decode_repetition_penalty: 1.15
decode_no_repeat_ngram_size: 3
hf_repo_id: stukenov/sozkz-core-omniaudio-300m-kk-asr-v1

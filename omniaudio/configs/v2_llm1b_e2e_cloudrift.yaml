# OmniAudio v2: E2E 1B — CloudRift (RTX 5090 32GB, single GPU)
inherits: v2_base
experiment_name: omniaudio_v2_llm1b
model_type: pretrained
stage: e2e
dataset_name: sozkz_mels
llm_name: stukenov/sozkz-core-llama-1b-kk-base-v1
llm_dim: 2048
audio_d_model: 1024
audio_n_heads: 16
audio_n_layers: 24
audio_n_conv: 2
init_from: ./outputs/omniaudio_v2_llm1b_ctc/checkpoint-best
unfreeze_llm_layers: 0
ctc_weight: 0.3
max_audio_len: 10.0
per_device_train_batch_size: 4
gradient_accumulation_steps: 16
dataloader_num_workers: 8
learning_rate: 1e-4
warmup_ratio: 0.05
weight_decay: 0.01
num_train_epochs: 5
save_steps: 2000
logging_steps: 50
label_smoothing: 0.1
bf16: true
torch_compile: true
hf_repo_id: stukenov/sozkz-core-omniaudio-1b-kk-asr-v1

# OmniAudio v2: Stage 1 CTC pretrain — encoder 256d for LLM 50M
inherits: v2_base
experiment_name: omniaudio_v2_llm50m_ctc
model_type: pretrained
stage: ctc_pretrain
dataset_name: sozkz_mels
audio_d_model: 256
audio_n_heads: 4
audio_n_layers: 6
audio_n_conv: 2
max_audio_len: 15.0
per_device_train_batch_size: 160
gradient_accumulation_steps: 1
dataloader_num_workers: 8
learning_rate: 3e-4
warmup_ratio: 0.05
weight_decay: 0.01
num_train_epochs: 2
save_steps: 5000
logging_steps: 50
bf16: true

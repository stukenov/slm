# OmniAudio v2: Big encoder + frozen SozKZ LLM 150M — 4×H100 cloud
inherits: v2_base
experiment_name: omniaudio_v2_llm150m
model_type: pretrained
stage: e2e
dataset_name: sozkz_mels
llm_name: stukenov/sozkz-core-llama-150m-kk-base-v1
llm_dim: 768
audio_d_model: 512
audio_n_heads: 8
audio_n_layers: 12
audio_n_conv: 2
init_from: ./outputs/omniaudio_v2_llm150m_ctc/checkpoint-best
unfreeze_llm_layers: 0
ctc_weight: 0.3
max_audio_len: 15.0
per_device_train_batch_size: 96
gradient_accumulation_steps: 1
dataloader_num_workers: 8
learning_rate: 3e-4
warmup_ratio: 0.05
weight_decay: 0.01
num_train_epochs: 5
save_steps: 2000
logging_steps: 50
label_smoothing: 0.1
bf16: true
hf_repo_id: stukenov/sozkz-core-omniaudio-150m-kk-asr-v1

# OmniAudio v2: Train on 1M pre-computed mels (2,100h Kazakh speech)
inherits: v2_base
experiment_name: omniaudio_v2_sozkz_mels_1m
model_type: scratch
stage: e2e
dataset_name: sozkz_mels
audio_d_model: 256
audio_n_heads: 4
audio_n_layers: 6
audio_n_conv: 2
decoder_d_model: 512
decoder_n_heads: 8
decoder_n_layers: 8
ctc_weight: 0.0
max_audio_len: 30.0
per_device_train_batch_size: 8
gradient_accumulation_steps: 4
learning_rate: 3e-4
warmup_ratio: 0.05
weight_decay: 0.01
num_train_epochs: 3
save_steps: 5000
eval_steps: 5000
logging_steps: 100
label_smoothing: 0.1

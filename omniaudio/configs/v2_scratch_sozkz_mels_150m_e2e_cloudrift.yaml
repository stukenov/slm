# OmniAudio v2: scratch 150M full E2E on SozKZ mels
# No pretrained LLM, no init_from, train encoder + decoder from random init
inherits: v2_base
experiment_name: omniaudio_v2_scratch_sozkz_mels_150m_e2e
model_type: scratch
stage: e2e
dataset_name: sozkz_mels
audio_d_model: 384
audio_n_heads: 6
audio_n_layers: 10
audio_n_conv: 2
decoder_d_model: 768
decoder_n_heads: 12
decoder_n_layers: 10
ctc_weight: 0.3
max_audio_len: 10.0
per_device_train_batch_size: 24
gradient_accumulation_steps: 1
dataloader_num_workers: 6
learning_rate: 2e-4
warmup_ratio: 0.05
weight_decay: 0.01
num_train_epochs: 10
save_steps: 10000
eval_steps: 10000
logging_steps: 100
label_smoothing: 0.1
bf16: true
torch_compile: false

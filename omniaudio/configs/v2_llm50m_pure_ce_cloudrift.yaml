# OmniAudio v2: Pure CE polish for 50M after hybrid E2E
inherits: v2_base
experiment_name: omniaudio_v2_llm50m_pure_ce
model_type: pretrained
stage: e2e
dataset_name: sozkz_mels
llm_name: stukenov/sozkz-core-llama-50m-kk-base-v2
llm_dim: 512
audio_d_model: 256
audio_n_heads: 4
audio_n_layers: 6
audio_n_conv: 2
init_from: ./outputs/omniaudio_v2_llm50m_unfreeze2/checkpoint-best
unfreeze_llm_layers: 2
ctc_weight: 0.0
max_audio_len: 10.0
per_device_train_batch_size: 8
gradient_accumulation_steps: 4
dataloader_num_workers: 8
learning_rate: 5e-6
warmup_ratio: 0.01
weight_decay: 0.01
num_train_epochs: 1
save_steps: 1000
logging_steps: 50
label_smoothing: 0.05
bf16: true
torch_compile: true
hf_repo_id: stukenov/sozkz-core-omniaudio-50m-kk-asr-v1

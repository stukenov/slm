# OmniAudio v2: E2E 50M with MorphBPE 100k tokenizer — CloudRift
inherits: v2_base
experiment_name: omniaudio_v2_llm50m_morphbpe100k
model_type: pretrained
stage: e2e
dataset_name: sozkz_mels
llm_name: stukenov/sozkz-core-llama-50m-kk-base-v2
llm_dim: 512
vocab_size: 100000
tokenizer_path: ./tokenizers/sozkz-morphbpe-100k-kk-v1
audio_d_model: 256
audio_n_heads: 4
audio_n_layers: 6
audio_n_conv: 2
init_from: ./outputs/omniaudio_v2_llm50m_ctc/checkpoint-best
unfreeze_llm_layers: 0
ctc_weight: 0.3
max_audio_len: 10.0
per_device_train_batch_size: 16
gradient_accumulation_steps: 1
dataloader_num_workers: 6
learning_rate: 3e-4
warmup_ratio: 0.05
weight_decay: 0.01
num_train_epochs: 1
save_steps: 2000
logging_steps: 50
label_smoothing: 0.1
bf16: true
torch_compile: false
hf_repo_id: stukenov/sozkz-core-omniaudio-50m-kk-asr-v1

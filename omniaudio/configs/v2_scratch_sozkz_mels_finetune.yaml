# OmniAudio v2: Fine-tune encoder on 1M mels, decoder frozen from best checkpoint
# Previous best: WER 21.28% on kzcalm (pure CE, checkpoint-best)
inherits: v2_base
experiment_name: omniaudio_v2_scratch_sozkz_mels_finetune
model_type: scratch
stage: e2e
dataset_name: sozkz_mels
audio_d_model: 256
audio_n_heads: 4
audio_n_layers: 6
audio_n_conv: 2
decoder_d_model: 512
decoder_n_heads: 8
decoder_n_layers: 8
init_from: ./outputs/omniaudio_v2_scratch_kzcalm_pure_ce/checkpoint-best
freeze_decoder: false
ctc_weight: 0.0
max_audio_len: 10.0
per_device_train_batch_size: 32
gradient_accumulation_steps: 1
dataloader_num_workers: 8
learning_rate: 1e-4
warmup_ratio: 0.05
weight_decay: 0.01
num_train_epochs: 1
save_steps: 5000
eval_steps: 5000
logging_steps: 100
label_smoothing: 0.05

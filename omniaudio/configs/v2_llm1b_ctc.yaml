# OmniAudio v2: Stage 1 CTC pretrain — encoder 1024d for LLM 1B
inherits: v2_base
experiment_name: omniaudio_v2_llm1b_ctc
model_type: pretrained
stage: ctc_pretrain
dataset_name: sozkz_mels
audio_d_model: 1024
audio_n_heads: 16
audio_n_layers: 24
audio_n_conv: 2
max_audio_len: 15.0
per_device_train_batch_size: 48
gradient_accumulation_steps: 1
dataloader_num_workers: 8
learning_rate: 3e-4
warmup_ratio: 0.05
weight_decay: 0.01
num_train_epochs: 2
save_steps: 5000
logging_steps: 50
bf16: true

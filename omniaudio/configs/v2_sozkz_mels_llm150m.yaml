# OmniAudio v2: Big encoder + frozen SozKZ LLM 150M decoder
# Dataset: 1M pre-computed mels (2,100h Kazakh speech)
# Stage: e2e (encoder + projector trainable, LLM frozen)
inherits: v2_base
experiment_name: omniaudio_v2_sozkz_mels_llm150m
model_type: pretrained
stage: e2e
dataset_name: sozkz_mels
llm_name: saken-tukenov/sozkz-core-llama-150m-kk-base-v1
llm_dim: 768
# Bigger encoder: 512d, 8 heads, 12 layers
audio_d_model: 512
audio_n_heads: 8
audio_n_layers: 12
audio_n_conv: 2
unfreeze_llm_layers: 0
ctc_weight: 0.3
max_audio_len: 15.0
per_device_train_batch_size: 16
gradient_accumulation_steps: 2
learning_rate: 3e-4
warmup_ratio: 0.05
weight_decay: 0.01
num_train_epochs: 1
save_steps: 5000
eval_steps: 5000
logging_steps: 100
label_smoothing: 0.1
bf16: true

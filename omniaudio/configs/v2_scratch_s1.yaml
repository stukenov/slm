# OmniAudio v2 scratch: CTC pretrain encoder
inherits: v2_base
experiment_name: omniaudio_v2_scratch_s1_ctc
model_type: scratch
stage: ctc_pretrain
audio_d_model: 256
audio_n_heads: 4
audio_n_layers: 6
audio_n_conv: 2
decoder_d_model: 512
decoder_n_heads: 8
decoder_n_layers: 8
augment: false
per_device_train_batch_size: 8
gradient_accumulation_steps: 4
learning_rate: 1e-3
warmup_ratio: 0.10
weight_decay: 0.01
num_train_epochs: 20
save_steps: 1000
logging_steps: 50

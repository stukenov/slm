inherits: base
experiment_name: omniaudio_cloud_stage2
stage: finetune
freeze_audio_encoder: false
freeze_llm: false
init_from_stage1: ./outputs/omniaudio_cloud_stage1/final

per_device_train_batch_size: 16
gradient_accumulation_steps: 4
learning_rate: 2e-5
warmup_ratio: 0.1
weight_decay: 0.01
num_train_epochs: 10
save_steps: 1000
eval_steps: 1000
logging_steps: 50
dataloader_num_workers: 4

inherits: base
experiment_name: omniaudio_stage2_finetune
stage: finetune
freeze_audio_encoder: false
freeze_llm: false
init_from_stage1: ./outputs/omniaudio_stage1_alignment/final

per_device_train_batch_size: 16
gradient_accumulation_steps: 4
learning_rate: 2e-5
warmup_ratio: 0.1
weight_decay: 0.01
num_train_epochs: 10
save_steps: 1000
eval_steps: 1000
logging_steps: 50

inherits: base

experiment_name: exp002_mel

data:
  hf_audio_dataset: stukenov/kzcalm-tts-kk-v1
  split: "train"

codec:
  type: mel
  latent_dim: 100
  n_mels: 100
  hop_length: 256
  n_fft: 1024

tokenizer:
  hf_repo: "stukenov/kzcalm-sp-tokenizer-4k-kk-v1"

model:
  num_layers: 10
  d_model: 512
  num_heads: 8
  d_ff: 2048
  dropout: 0.1
  max_text_len: 512
  max_audio_frames: 1500

flow:
  num_sampling_steps: 8
  sigma_min: 0.001
  loss_type: huber

training:
  batch_size: 32
  gradient_accumulation_steps: 2
  max_steps: 200000
  learning_rate: 1.0e-4
  warmup_steps: 2000
  weight_decay: 0.01
  grad_clip: 0.5
  bf16: true
  num_workers: 4
  save_steps: 5000
  logging_steps: 100
  compile: true

# B3 Baseline: ~35M param flow-matching TTS (Chinchilla-optimal for 400h)
inherits: base

experiment_name: exp001_baseline_v2

data:
  hf_codes_dataset: stukenov/kzcalm-mimi-codes-kk-v1
  latent_dir: /workspace/latents_512
  split: train

tokenizer:
  hf_repo: stukenov/kzcalm-sp-tokenizer-4k-kk-v1

model:
  num_layers: 10
  d_model: 512
  num_heads: 8
  d_ff: 2048
  dropout: 0.1
  max_text_len: 512
  max_audio_frames: 1500

training:
  batch_size: 64
  gradient_accumulation_steps: 1
  max_steps: 300000
  learning_rate: 3.0e-4
  warmup_steps: 2000
  weight_decay: 0.01
  bf16: true
  compile: true
  grad_clip: 1.0
  num_workers: 4
  save_steps: 10000
  logging_steps: 100

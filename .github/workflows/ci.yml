name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install --dry-run . 2>/dev/null || echo "deps check noted"
      - run: python -m py_compile $(find . -name "*.py" -not -path "./.git/*" | head -20) || true

---
- name: "exp028: Run inference on 1.08B model"
  hosts: gpu_servers
  vars:
    venv_path: "{{ project_dir }}/.venv"
    python: "{{ venv_path }}/bin/python3"

  tasks:
    - name: Ensure dirs exist
      file:
        path: "{{ item }}"
        state: directory
      loop:
        - "{{ project_dir }}/scripts/inference"
        - "{{ project_dir }}/results"

    - name: Deploy eval script inline
      copy:
        content: |
          #!/usr/bin/env python3
          import torch, json
          from transformers import AutoModelForCausalLM, PreTrainedTokenizerFast
          from huggingface_hub import hf_hub_download
          MODEL = "stukenov/sozkz-core-llama-1b-kk-base-v1"
          PROMPTS = [
              ("Саясат", "Қазақстан Президенті"),
              ("Экономика", "Экономика министрлігі"),
              ("Білім", "Білім беру жүйесі"),
              ("Ауа райы", "Ауа райы болжамы бойынша"),
              ("Тарих", "Қазақ халқының тарихы"),
              ("Технология", "Жасанды интеллект технологиясы"),
              ("Спорт", "Футбол чемпионаты"),
              ("Денсаулық", "Денсаулық сақтау министрлігі"),
              ("Күнделікті", "Алматы қаласында бүгін"),
              ("Ғылым", "Қазіргі заманғы физика ғылымында"),
              ("Әдебиет", "Алыстағы ауылда бір кәрі шал тұратын,"),
              ("Жалпы", "Қазақстан — бұл"),
          ]
          print("Loading model...")
          tok_file = hf_hub_download(MODEL, "tokenizer.json")
          tokenizer = PreTrainedTokenizerFast(tokenizer_file=tok_file)
          tokenizer.pad_token_id = 1
          model = AutoModelForCausalLM.from_pretrained(MODEL, torch_dtype=torch.bfloat16, device_map="cuda")
          print(f"Loaded: {sum(p.numel() for p in model.parameters())/1e6:.1f}M params")
          results = []
          for cat, prompt in PROMPTS:
              ids = tokenizer.encode(prompt, return_tensors="pt").to("cuda")
              with torch.no_grad():
                  out = model.generate(ids, max_new_tokens=200, do_sample=True, temperature=0.7, top_p=0.9, top_k=50, repetition_penalty=1.1)
              text = tokenizer.decode(out[0], skip_special_tokens=True)
              results.append({"category": cat, "prompt": prompt, "generation": text})
              print(f"\n=== [{cat}] {prompt} ===")
              print(text)
          with open("/root/slm/results/eval_1b_generations.json", "w") as f:
              json.dump(results, f, ensure_ascii=False, indent=2)
          print(f"\nSaved {len(results)} generations")
        dest: "{{ project_dir }}/scripts/inference/eval_1b.py"
        mode: '0755'

    - name: Run inference
      shell: >
        {{ python }} {{ project_dir }}/scripts/inference/eval_1b.py
        2>&1 | tee {{ project_dir }}/logs/eval_1b.log
      args:
        chdir: "{{ project_dir }}"
      async: 1800
      poll: 30
      register: result

    - name: Show generations
      debug:
        msg: "{{ result.stdout_lines }}"

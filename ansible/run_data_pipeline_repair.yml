---
- name: "exp028: Repair pipeline — rerun failed steps with fixed scripts"
  hosts: gpu_servers
  vars:
    venv_path: "{{ project_dir }}/.venv"
    python: "{{ venv_path }}/bin/python3"
    log_dir: "{{ project_dir }}/logs"
    filter_script: "{{ project_dir }}/scripts/data/filter_foreign_chars.py"
    ppl_script: "{{ project_dir }}/scripts/data/ppl_score_dataset.py"
    tokenize_script: "{{ project_dir }}/scripts/tokenizer/tokenize_dataset.py"

    kk_filtered: "stukenov/sozkz-corpus-clean-kk-text-v4"
    enkk_filtered: "stukenov/sozkz-corpus-clean-enkk-fineweb-edu-v2"
    kk_ppl_filtered: "stukenov/sozkz-corpus-clean-kk-text-v5"
    enkk_ppl_filtered: "stukenov/sozkz-corpus-clean-enkk-fineweb-edu-v3"
    kk_tokenized: "stukenov/sozkz-corpus-tokenized-kk-llama50k-v4"
    enkk_tokenized: "stukenov/sozkz-corpus-tokenized-enkk-fineweb-edu-v2"
    tokenizer_name: "stukenov/sozkz-core-gpt2-50k-kk-base-v1"

  tasks:
    - name: Sync fixed scripts to server
      synchronize:
        src: "{{ playbook_dir }}/../scripts/"
        dest: "{{ project_dir }}/scripts/"
        rsync_opts:
          - "--exclude=__pycache__"

    - name: Ensure log directory exists
      file:
        path: "{{ log_dir }}"
        state: directory

    # --- Step 1b REPAIR: Filter ENKK (failed due to verification error) ---
    - name: "Step 1b REPAIR: Filter ENKK dataset"
      shell: >
        {{ python }} {{ filter_script }} --run --dataset enkk
        --output-enkk {{ enkk_filtered }}
        2>&1 | tee {{ log_dir }}/filter_enkk_repair.log
      args:
        chdir: "{{ project_dir }}"
      async: 14400
      poll: 60
      register: filter_enkk

    - name: Show ENKK filter results
      debug:
        msg: "{{ filter_enkk.stdout_lines[-10:] }}"

    # --- Step 2a: PPL score KK (may have failed too) ---
    - name: "Step 2a: PPL score + filter KK (keep P90)"
      shell: >
        {{ python }} {{ ppl_script }} --run --dataset kk
        --dataset-name {{ kk_filtered }}
        --percentile 90 --output {{ kk_ppl_filtered }}
        2>&1 | tee {{ log_dir }}/ppl_filter_kk.log
      args:
        chdir: "{{ project_dir }}"
      async: 43200
      poll: 120
      register: ppl_kk

    - name: Show KK PPL results
      debug:
        msg: "{{ ppl_kk.stdout_lines[-15:] }}"

    # --- Step 2b: PPL score ENKK ---
    - name: "Step 2b: PPL score + filter ENKK (keep P90)"
      shell: >
        {{ python }} {{ ppl_script }} --run --dataset enkk
        --dataset-name {{ enkk_filtered }}
        --percentile 90 --output {{ enkk_ppl_filtered }}
        2>&1 | tee {{ log_dir }}/ppl_filter_enkk.log
      args:
        chdir: "{{ project_dir }}"
      async: 43200
      poll: 120
      register: ppl_enkk

    - name: Show ENKK PPL results
      debug:
        msg: "{{ ppl_enkk.stdout_lines[-15:] }}"

    # --- Step 3: Tokenize both ---
    - name: "Step 3a: Tokenize KK"
      shell: >
        {{ python }} {{ tokenize_script }}
        --dataset {{ kk_ppl_filtered }}
        --tokenizer {{ tokenizer_name }}
        --output {{ kk_tokenized }}
        --block-size 1024 --num-proc 8
        2>&1 | tee {{ log_dir }}/tokenize_kk.log
      args:
        chdir: "{{ project_dir }}"
      async: 43200
      poll: 120
      register: tok_kk

    - name: Show KK tokenize results
      debug:
        msg: "{{ tok_kk.stdout_lines[-10:] }}"

    - name: "Step 3b: Tokenize ENKK"
      shell: >
        {{ python }} {{ tokenize_script }}
        --dataset {{ enkk_ppl_filtered }}
        --tokenizer {{ tokenizer_name }}
        --output {{ enkk_tokenized }}
        --text-column "text_en,text_kk"
        --block-size 1024 --num-proc 8
        2>&1 | tee {{ log_dir }}/tokenize_enkk.log
      args:
        chdir: "{{ project_dir }}"
      async: 43200
      poll: 120
      register: tok_enkk

    - name: Show ENKK tokenize results
      debug:
        msg: "{{ tok_enkk.stdout_lines[-10:] }}"

    - name: Pipeline complete
      debug:
        msg: |
          ============================================================
          DATA PIPELINE COMPLETE
          ============================================================
          KK:   {{ kk_ppl_filtered }} -> {{ kk_tokenized }}
          ENKK: {{ enkk_ppl_filtered }} -> {{ enkk_tokenized }}
          ============================================================

---
- name: Check SFT status
  hosts: kaznu
  gather_facts: false
  vars:
    ansible_ssh_common_args: '-o ConnectTimeout=180'
  tasks:
    - name: Check SFT log
      shell: tail -20 /tmp/sft.log 2>/dev/null || echo "No log"
      register: log_out

    - name: Check process
      shell: ps aux | grep sft_1b | grep -v grep | wc -l
      register: proc_out

    - name: Show
      debug:
        msg: "{{ log_out.stdout_lines }} | procs={{ proc_out.stdout }}"

---
- name: "exp028: Tokenize filtered datasets"
  hosts: gpu_servers
  vars:
    venv_path: "{{ project_dir }}/.venv"
    python: "{{ venv_path }}/bin/python3"
    log_dir: "{{ project_dir }}/logs"
    tokenize_script: "{{ project_dir }}/scripts/tokenizer/tokenize_dataset.py"
    tokenizer_name: "stukenov/sozkz-core-gpt2-50k-kk-base-v1"

  tasks:
    - name: Sync scripts
      synchronize:
        src: "{{ playbook_dir }}/../scripts/"
        dest: "{{ project_dir }}/scripts/"
        rsync_opts:
          - "--exclude=__pycache__"

    - name: "Tokenize KK"
      shell: >
        {{ python }} {{ tokenize_script }}
        --dataset stukenov/sozkz-corpus-clean-kk-text-v4
        --tokenizer {{ tokenizer_name }}
        --output stukenov/sozkz-corpus-tokenized-kk-llama50k-v4
        --block-size 1024 --num-proc 8
        2>&1 | tee {{ log_dir }}/tokenize_kk.log
      args:
        chdir: "{{ project_dir }}"
      async: 43200
      poll: 60
      register: tok_kk

    - name: KK results
      debug:
        msg: "{{ tok_kk.stdout_lines[-10:] }}"

    - name: "Tokenize ENKK"
      shell: >
        {{ python }} {{ tokenize_script }}
        --dataset stukenov/sozkz-corpus-clean-enkk-fineweb-edu-v2
        --tokenizer {{ tokenizer_name }}
        --output stukenov/sozkz-corpus-tokenized-enkk-fineweb-edu-v2
        --text-column "text_en,text_kk"
        --block-size 1024 --num-proc 8
        2>&1 | tee {{ log_dir }}/tokenize_enkk.log
      args:
        chdir: "{{ project_dir }}"
      async: 43200
      poll: 60
      register: tok_enkk

    - name: ENKK results
      debug:
        msg: "{{ tok_enkk.stdout_lines[-10:] }}"

    - name: Done
      debug:
        msg: "Tokenization complete!"

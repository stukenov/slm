# ============================================================================
# smoke_cloud: Pipeline smoke test (50 steps, 1% data, no checkpoints)
# Architecture: Llama ~50M (same as exp004b)
# Dataset: 1% of kz-transformers/multidomain-kazakh-dataset
# Goal: Verify vast.ai cloud pipeline works end-to-end before real runs
# ============================================================================
inherits: base
experiment_name: smoke_cloud

# Custom Llama ~50M from scratch (same as exp004)
model_name: custom-llama-50m
from_scratch: true

model_config:
  model_type: llama
  vocab_size: 32000
  hidden_size: 576
  intermediate_size: 1536
  num_hidden_layers: 8
  num_attention_heads: 8
  num_key_value_heads: 8
  max_position_embeddings: 1024
  tie_word_embeddings: true
  bos_token_id: 0
  eos_token_id: 0
  pad_token_id: 1

# Dataset — load only 1% via HF split slicing (fast download)
dataset_name: kz-transformers/multidomain-kazakh-dataset
dataset_split: "train[:1%]"

# Tokenizer from HuggingFace Hub (works remotely)
tokenizer_path: saken-tukenov/sozkz-vocab-bpe-32k-kk-base-v1
tokenizer_mode: pretrained

# Minimal training — just verify the pipeline
max_steps: 50
learning_rate: 6e-4
weight_decay: 0.1
per_device_train_batch_size: 8
gradient_accumulation_steps: 1

# No evals/saves during smoke test
eval_strategy: "no"
save_strategy: "no"
logging_steps: 10

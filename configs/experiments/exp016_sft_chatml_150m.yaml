# ============================================================================
# exp016: SFT of Llama 150M with ChatML format (8x RTX 4090)
# Architecture: Llama 150M, task=sft, ChatML template
# Init: sozkz-core-llama-150m-kk-base-v1
# Dataset: local /root/slm/data/sft_mix (mixed instruction data, ChatML)
# Goal: Improved instruct model v2 with ChatML formatting on cloud GPUs
# ============================================================================
inherits: base

experiment_name: exp016_sft_chatml_150m
task: sft

init_from: stukenov/sozkz-core-llama-150m-kk-base-v1
tokenizer_path: stukenov/sozkz-core-gpt2-50k-kk-base-v1
tokenizer_mode: pretrained

sft_dataset: /root/slm/data/sft_mix
sft_format: chatml
max_length: 1024

# 8x RTX 4090 (24GB each), 150M model, max_length 1024
# Effective batch: 4 × 8 × 8 = 256
per_device_train_batch_size: 4
gradient_accumulation_steps: 8
dataloader_num_workers: 4

learning_rate: 2e-5
weight_decay: 0.01
num_train_epochs: 1
warmup_ratio: 0.03
lr_scheduler_type: cosine
max_grad_norm: 1.0

eval_steps: 500
save_steps: 500
logging_steps: 10
save_total_limit: 3

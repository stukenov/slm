# ============================================================================
# exp005a: Llama 50M on balanced dataset (domain-balanced subset)
# Architecture: Llama ~50M (same as exp004b)
# Tokenizer: sozkz-vocab-bpe-32k-kk-base-v1
# Dataset: sozkz-corpus-balanced-kk-gpt2-v1 (pretokenized, balanced domains)
# Goal: Test if domain balancing improves over raw multidomain (exp004)
# ============================================================================
inherits: base

experiment_name: exp005_balanced_50m

# Custom Llama ~50M from scratch (same arch as exp004)
model_name: custom-llama-50m
from_scratch: true

model_config:
  model_type: llama
  vocab_size: 32000
  hidden_size: 576
  intermediate_size: 1536
  num_hidden_layers: 8
  num_attention_heads: 8
  num_key_value_heads: 8
  max_position_embeddings: 1024
  tie_word_embeddings: true
  bos_token_id: 0
  eos_token_id: 0
  pad_token_id: 1

# Dataset
dataset_name: saken-tukenov/sozkz-corpus-balanced-kk-gpt2-v1
pretokenized_dataset: saken-tukenov/sozkz-corpus-balanced-kk-gpt2-v1
block_size: 1024

# Tokenizer
tokenizer_path: saken-tukenov/sozkz-vocab-bpe-32k-kk-base-v1
tokenizer_mode: pretrained

# Training hyperparameters
learning_rate: 6e-4
weight_decay: 0.1
num_train_epochs: 1
per_device_train_batch_size: 16
gradient_accumulation_steps: 2

# Schedule
warmup_steps: 700
max_grad_norm: 1.0
lr_scheduler_type: cosine

# Eval/Save
eval_steps: 2000
save_steps: 2000
logging_steps: 50

# ============================================================================
# exp006a: Llama 150M on balanced dataset (scale-up of exp005a)
# Architecture: Llama ~150M (768h, 18L, 12heads), BPE-32K vocab
# Tokenizer: sozkz-vocab-bpe-32k-kk-base-v1
# Dataset: sozkz-corpus-balanced-kk-gpt2-v1 (pretokenized, balanced)
# Goal: Scale from 50M to 150M on same balanced data
# ============================================================================
inherits: base

experiment_name: exp006_balanced_150m

# Custom Llama ~150M from scratch
model_name: custom-llama-150m
from_scratch: true

model_config:
  model_type: llama
  vocab_size: 32000
  hidden_size: 768
  intermediate_size: 2048
  num_hidden_layers: 18
  num_attention_heads: 12
  num_key_value_heads: 12
  max_position_embeddings: 1024
  tie_word_embeddings: true
  bos_token_id: 0
  eos_token_id: 0
  pad_token_id: 1

# Dataset
dataset_name: saken-tukenov/sozkz-corpus-balanced-kk-gpt2-v1
pretokenized_dataset: saken-tukenov/sozkz-corpus-balanced-kk-gpt2-v1
block_size: 1024

# Tokenizer
tokenizer_path: saken-tukenov/sozkz-vocab-bpe-32k-kk-base-v1
tokenizer_mode: pretrained

# Training hyperparameters
learning_rate: 3e-4
weight_decay: 0.1
num_train_epochs: 1
per_device_train_batch_size: 8
gradient_accumulation_steps: 4

# Schedule
warmup_steps: 1000
max_grad_norm: 1.0
lr_scheduler_type: cosine

# Eval/Save
eval_steps: 2000
save_steps: 2000
logging_steps: 50

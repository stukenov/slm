# ============================================================================
# exp036: Qwen2.5-style ~470M on ~6-7B cleaned Kazakh tokens
# Architecture: Qwen2.5-0.5B (896h, 24L, 14heads, 2KV GQA, SwiGLU), vocab 100K
# Tokenizer: stukenov/sozkz-morphbpe-100k-kk-v1
# Dataset: cleaned kk-v4, pre-tokenized with morphbpe-100k
# Hardware: 8xH100 SXM 80GB (RunPod)
# Goal: Qwen2.5-class model for Kazakh, HF-native Qwen2ForCausalLM
# ============================================================================
inherits: base
experiment_name: exp036_qwen_500m

model_name: custom-qwen2-470m
from_scratch: true

model_config:
  model_type: qwen2
  vocab_size: 100000
  hidden_size: 896
  intermediate_size: 4864       # SwiGLU (~5.4x hidden)
  num_hidden_layers: 24
  num_attention_heads: 14
  num_key_value_heads: 2        # GQA 7:1
  max_position_embeddings: 32768
  rope_theta: 1000000.0         # Qwen2.5 uses 1M (vs 10K in Llama)
  rms_norm_eps: 1.0e-6
  tie_word_embeddings: true
  attention_bias: true           # Qwen2 has bias in Q,K,V
  mlp_bias: false                # No bias in MLP
  bos_token_id: 0
  eos_token_id: 0
  pad_token_id: 1

# Pre-tokenized dataset (KK only, morphbpe-100k)
pretokenized_dataset: stukenov/sozkz-corpus-tokenized-kk-morphbpe100k-v1

# Tokenizer
tokenizer_path: stukenov/sozkz-morphbpe-100k-kk-v1
tokenizer_mode: pretrained

# Training hyperparameters
learning_rate: 4e-4
weight_decay: 0.1
num_train_epochs: 1
per_device_train_batch_size: 32
gradient_accumulation_steps: 1
# 8 GPUs: 8 x 32 x 2048 = 524,288 tok/step
# ~7B tokens / 524K = 13,300 steps

# Schedule
warmup_steps: 500
max_grad_norm: 1.0
lr_scheduler_type: cosine

# Eval/Save
eval_steps: 1000
save_steps: 500
logging_steps: 25
save_total_limit: 3
block_size: 2048

# Performance
bf16: true
dataloader_num_workers: 4
torch_compile: true

# Z-loss regularization
z_loss_coeff: 1.0e-4

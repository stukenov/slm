# ============================================================================
# exp009b: MoE 330M domain-specific pretraining with curriculum
# Architecture: MoE ~330M (A62M active), domain curriculum training
# Init: sozkz-moe-mix-160m-kk-base-v1 (upcycled MoE)
# Dataset: sozkz-corpus-balanced-kk-moe-domain-v1 (domain-balanced)
# Goal: Train MoE with domain curriculum — experts specialize per domain
# ============================================================================
inherits: base

experiment_name: exp009_moe_domain_pretrain
model_name: kazakh-moe-330M-A62M-domain

init_from: saken-tukenov/sozkz-moe-mix-160m-kk-base-v1
pretokenized_dataset: saken-tukenov/sozkz-corpus-balanced-kk-moe-domain-v1
tokenizer_path: saken-tukenov/sozkz-core-gpt2-50k-kk-base-v1
tokenizer_mode: pretrained
block_size: 1024

use_moe_trainer: true
domain_curriculum: true

learning_rate: 3e-4
weight_decay: 0.1
max_steps: 10000
per_device_train_batch_size: 16
gradient_accumulation_steps: 1
warmup_steps: 1000
lr_scheduler_type: cosine
max_grad_norm: 1.0

eval_steps: 500
save_steps: 2000
logging_steps: 50
bf16: true
dataloader_num_workers: 4
torch_compile: true

# ============================================================================
# exp019: Llama 897M Chinchilla-optimal on 17.8B tokens (50K vocab)
# Architecture: Llama ~897M (1536h, 24L, 24heads, SwiGLU), vocab 50257
# Tokenizer: sozkz-core-gpt2-50k-kk-base-v1
# Dataset: llama50k-v3 (9B) + fineweb-edu-v1 (8.8B) = 17.8B tokens combined
# Chinchilla ratio: 17.8B / 897M = 19.8:1 (target: 20:1)
# Embedding overhead: 77M / 897M = 8.6% (healthy)
# Goal: Largest Chinchilla-optimal dense Kazakh model with all available 50K data
# ============================================================================
inherits: base
experiment_name: exp019_llama_900m_chinchilla

model_name: custom-llama-897m
from_scratch: true

model_config:
  model_type: llama
  vocab_size: 50257
  hidden_size: 1536
  intermediate_size: 5376       # 3.5 × hidden
  num_hidden_layers: 24
  num_attention_heads: 24
  num_key_value_heads: 24
  max_position_embeddings: 2048
  tie_word_embeddings: true
  bos_token_id: 0
  eos_token_id: 0
  pad_token_id: 1

# Pre-tokenized datasets (combined: 17.36M blocks × 1024 ≈ 17.8B tokens)
pretokenized_dataset: stukenov/sozkz-corpus-tokenized-kk-llama50k-v3
extra_pretokenized_datasets:
  - stukenov/sozkz-corpus-tokenized-enkk-fineweb-edu-v1

# Tokenizer
tokenizer_path: saken-tukenov/sozkz-core-gpt2-50k-kk-base-v1
tokenizer_mode: pretrained

# Training hyperparameters (Chinchilla-optimal: 1 epoch over 17.8B tokens)
learning_rate: 2e-4
weight_decay: 0.1
num_train_epochs: 1
per_device_train_batch_size: 4
gradient_accumulation_steps: 64
# effective batch = 4 × 64 = 256 blocks × 1024 = 262K tokens/step
# ~17.36M blocks / 256 = ~67,812 steps total

# Schedule
warmup_steps: 2000
max_grad_norm: 1.0
lr_scheduler_type: cosine

# Eval/Save
eval_steps: 2000
save_steps: 2000
logging_steps: 50
save_total_limit: 3
block_size: 1024

# Performance
bf16: true
dataloader_num_workers: 4

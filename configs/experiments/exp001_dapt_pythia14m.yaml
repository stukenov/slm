# ============================================================================
# exp001: Domain-Adaptive Pre-Training (DAPT) of Pythia-14M on Kazakh text
# Architecture: Pythia-14M (EleutherAI), original tokenizer
# Dataset: kz-transformers/multidomain-kazakh-dataset (23.6M samples)
# Goal: Baseline — adapt smallest Pythia to Kazakh via continued pretraining
# ============================================================================
inherits: base
experiment_name: exp001_dapt_pythia14m
model_name: EleutherAI/pythia-14m
dataset_name: kz-transformers/multidomain-kazakh-dataset
learning_rate: 1e-4
num_train_epochs: 5

# Optimizations for faster training (2x batch = 2x faster)
per_device_train_batch_size: 32
eval_steps: 1000
save_steps: 1000

# Resume from last checkpoint
resume_from_checkpoint: ./outputs/exp001_dapt_pythia14m/checkpoint-13000

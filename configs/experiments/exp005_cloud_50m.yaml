# ============================================================================
# exp005b: Llama 50M on vast.ai cloud (pretokenized, multi-GPU)
# Architecture: Llama ~50M (same as exp004b)
# Tokenizer: sozkz-vocab-bpe-32k-kk-base-v1 (from HF Hub)
# Dataset: sozkz-core-llama-50m-kk-base-v1-tokenized (pretokenized)
# Goal: Cloud-optimized version of exp005a with larger batch and pretokenized data
# ============================================================================
inherits: base
experiment_name: exp005_cloud_50m

# Custom Llama ~50M from scratch
model_name: custom-llama-50m
from_scratch: true

model_config:
  model_type: llama
  vocab_size: 32000
  hidden_size: 576
  intermediate_size: 1536
  num_hidden_layers: 8
  num_attention_heads: 8
  num_key_value_heads: 8
  max_position_embeddings: 1024
  tie_word_embeddings: true
  bos_token_id: 0
  eos_token_id: 0
  pad_token_id: 1

# Dataset (original, for reference)
dataset_name: kz-transformers/multidomain-kazakh-dataset

# Pre-tokenized dataset from HuggingFace (skip tokenization)
pretokenized_dataset: saken-tukenov/sozkz-core-llama-50m-kk-base-v1-tokenized

# Tokenizer: Kazakh BPE (from HuggingFace Hub — works remotely)
tokenizer_path: saken-tukenov/sozkz-vocab-bpe-32k-kk-base-v1
tokenizer_mode: pretrained

# Training hyperparameters
learning_rate: 6e-4
weight_decay: 0.1
num_train_epochs: 1
per_device_train_batch_size: 32
gradient_accumulation_steps: 2
# effective batch = 32 * 8 GPUs * 2 = 512 -> ~10,972 steps/epoch

# Schedule
warmup_steps: 500
max_grad_norm: 1.0
lr_scheduler_type: cosine

# Eval/Save — more checkpoints to find optimal point (overfitting observed on exp004)
per_device_eval_batch_size: 64
eval_steps: 2500
save_steps: 2500
save_total_limit: 5
logging_steps: 25

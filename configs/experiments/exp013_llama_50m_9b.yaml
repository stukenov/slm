# ============================================================================
# exp013: Llama 50M on full 9B-token corpus (definitive 50M run)
# Architecture: Llama ~50M (576h, 8L, 8heads), vocab 50257
# Tokenizer: sozkz-core-gpt2-50k-kk-base-v1
# Dataset: sozkz-corpus-tokenized-kk-llama50k-v3 (9B tokens, 1 epoch)
# Goal: Best 50M model — full corpus, large batch, Chinchilla-optimal
# ============================================================================
inherits: base
experiment_name: exp013_llama_50m_9b

# Custom Llama ~50M from scratch
model_name: custom-llama-50m
from_scratch: true

model_config:
  model_type: llama
  vocab_size: 50257
  hidden_size: 576
  intermediate_size: 1536
  num_hidden_layers: 8
  num_attention_heads: 8
  num_key_value_heads: 8
  max_position_embeddings: 1024
  tie_word_embeddings: true
  bos_token_id: 0
  eos_token_id: 0
  pad_token_id: 1

# Pre-tokenized dataset (9B tokens, 8.79M blocks x 1024)
pretokenized_dataset: saken-tukenov/sozkz-corpus-tokenized-kk-llama50k-v3

# Tokenizer
tokenizer_path: saken-tukenov/sozkz-core-gpt2-50k-kk-base-v1
tokenizer_mode: pretrained

# Training hyperparameters
learning_rate: 6e-4
weight_decay: 0.1
num_train_epochs: 1
per_device_train_batch_size: 64
gradient_accumulation_steps: 2

# Schedule (~68,654 total steps at effective bs=128, 1 epoch over 9B tokens)
warmup_steps: 2000
max_grad_norm: 1.0
lr_scheduler_type: cosine

# Eval/Save
eval_steps: 2000
save_steps: 2000
logging_steps: 50
save_total_limit: 3

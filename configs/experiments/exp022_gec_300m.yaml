# ============================================================================
# exp022: GEC (Grammar Error Correction) SFT of Llama 300M
# Architecture: Llama 325M, task=gec, tag-based error correction
# Init: stukenov/sozkz-core-llama-300m-kk-base-v1
# Dataset: stukenov/sozkz-corpus-synthetic-kk-gec-v1 (1.09M examples, balanced ~200K)
# Goal: Kazakh grammar correction model with error-type tags
# ============================================================================
inherits: base

experiment_name: exp022_gec_300m
task: sft

init_from: stukenov/sozkz-core-llama-300m-kk-base-v1
tokenizer_path: stukenov/sozkz-core-gpt2-50k-kk-base-v1
tokenizer_mode: pretrained

sft_dataset: stukenov/sozkz-corpus-synthetic-kk-gec-v1
sft_format: gec_tagged
max_length: 512

per_device_train_batch_size: 8
gradient_accumulation_steps: 8
dataloader_num_workers: 4

learning_rate: 2e-5
weight_decay: 0.01
num_train_epochs: 3
warmup_ratio: 0.03
lr_scheduler_type: cosine
max_grad_norm: 1.0

eval_steps: 500
save_steps: 500
logging_steps: 10
save_total_limit: 3

hf_repo: stukenov/sozkz-core-llama-300m-kk-gec-v1

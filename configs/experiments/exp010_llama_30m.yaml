# ============================================================================
# exp010a: Llama 30M from scratch (RMSNorm, RoPE, SwiGLU)
# Architecture: Llama ~30M (384h, 8L, 6heads), no bias, no dropout
# Tokenizer: sozkz-core-gpt2-50k-kk-base-v1
# Dataset: sozkz-corpus-clean-kk-pretrain-v2 (8 epochs ≈ 640M tokens)
# Goal: Compare Llama 30M vs GPT-2 30M (exp008a) — architecture ablation
# ============================================================================
inherits: base
experiment_name: exp010_llama_30m

# LLaMA-style ~30M from scratch (RMSNorm, RoPE, SwiGLU)
model_name: custom-llama-30m
from_scratch: true

model_config:
  model_type: llama
  vocab_size: 50257
  hidden_size: 384
  num_hidden_layers: 8
  num_attention_heads: 6
  num_key_value_heads: 6
  intermediate_size: 1024
  hidden_act: silu
  max_position_embeddings: 1024
  rms_norm_eps: 1.0e-5
  tie_word_embeddings: true
  attention_bias: false
  mlp_bias: false
  bos_token_id: 2
  eos_token_id: 0
  pad_token_id: 1

# Pre-tokenized dataset
dataset_name: saken-tukenov/sozkz-corpus-clean-kk-text-v2
pretokenized_dataset: saken-tukenov/sozkz-corpus-clean-kk-pretrain-v2

# Tokenizer
tokenizer_path: saken-tukenov/sozkz-core-gpt2-50k-kk-base-v1
tokenizer_mode: pretrained

# Training — 8 epochs ≈ 640M tokens (more passes, lower dropout)
learning_rate: 6e-4
weight_decay: 0.05
num_train_epochs: 8
per_device_train_batch_size: 64
gradient_accumulation_steps: 4
# effective batch = 64 * 4 * num_gpus

# Schedule
warmup_steps: 100
max_grad_norm: 1.0
lr_scheduler_type: cosine

# Eval/Save
per_device_eval_batch_size: 64
eval_steps: 200
save_steps: 200
save_total_limit: 3
logging_steps: 10

block_size: 1024

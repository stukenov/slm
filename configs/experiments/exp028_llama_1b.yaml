# ============================================================================
# exp028: Llama 1.2B on ~16.2B cleaned Kazakh+FineWeb-Edu tokens
# Architecture: Llama ~1.22B (2048h, 22L, 16heads, SwiGLU), vocab 50257
# Tokenizer: sozkz-core-gpt2-50k-kk-base-v1
# Dataset: cleaned kk-v4 (~8.4B) + cleaned fineweb-edu-v2 (~7.8B) ≈ 16.2B tokens
# Chinchilla ratio: ~16.2B / 1.22B = 13.3:1 (comparable to exp023 600M at 15.3:1)
# Hardware: 8×H100 SXM 80GB (RunPod), estimated ~13.5h, ~$355
# Goal: Scale up from exp023 (600M) — largest dense Kazakh model
# ============================================================================
inherits: base
experiment_name: exp028_llama_1b

model_name: custom-llama-1220m
from_scratch: true

model_config:
  model_type: llama
  vocab_size: 50257
  hidden_size: 2048
  intermediate_size: 5504       # ~2.69 × hidden (256-aligned)
  num_hidden_layers: 22
  num_attention_heads: 16
  num_key_value_heads: 16       # MHA
  max_position_embeddings: 2048
  tie_word_embeddings: true
  bos_token_id: 0
  eos_token_id: 0
  pad_token_id: 1

# Pre-tokenized datasets (to be created after cleaning)
pretokenized_dataset: stukenov/sozkz-corpus-tokenized-kk-llama50k-v4
extra_pretokenized_datasets:
  - stukenov/sozkz-corpus-tokenized-enkk-fineweb-edu-v2

# Tokenizer
tokenizer_path: saken-tukenov/sozkz-core-gpt2-50k-kk-base-v1
tokenizer_mode: pretrained

# Training hyperparameters
learning_rate: 2e-4
weight_decay: 0.1
num_train_epochs: 1
per_device_train_batch_size: 8
gradient_accumulation_steps: 1
# 8 GPUs: 8 × 8 = 64 blocks/step = 65.5K tokens/step
# ~15.8M blocks / 64 ≈ 247,000 steps

# Schedule
warmup_steps: 1000
max_grad_norm: 1.0
lr_scheduler_type: cosine

# Eval/Save
eval_steps: 2000
save_steps: 2000
logging_steps: 25
save_total_limit: 3
block_size: 1024

# Performance
bf16: true
dataloader_num_workers: 4
torch_compile: true
